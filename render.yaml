services:
  - type: web
    name: crispr-guardian
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: GROQ_API_KEY
        value: your_groq_api_key_here
